<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0D3551"/>
      <stop offset="55%" stop-color="#1F6AA3"/>
      <stop offset="100%" stop-color="#EAF3FB"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#FAFBFC" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FAFBFC" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FAFBFC" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#sky)"/>
  <rect width="800" height="1000" fill="url(#grid)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>

  <!-- Stylized chair / cabinet silhouette -->
  <g opacity="0.18" fill="#FAFBFC">
    <rect x="120" y="620" width="560" height="14" rx="7"/>
    <rect x="180" y="500" width="440" height="130" rx="40"/>
    <rect x="220" y="370" width="360" height="140" rx="40"/>
    <rect x="380" y="180" width="40" height="200" rx="20"/>
    <circle cx="400" cy="160" r="48"/>
  </g>

  <!-- Tooth icon -->
  <g transform="translate(310 700)" fill="none" stroke="#FAFBFC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <path d="M60 0c-22 0-38 16-38 38 0 27 16 38 22 65 6 27 6 60 22 76 8 10 22 10 28-4 6-14 6-39 11-39s5 25 11 39c6 14 20 14 28 4 16-16 16-49 22-76 6-27 22-38 22-65 0-22-16-38-38-38-12 0-22 6-32 11-10 6-16 6-22 6s-12 0-22-6c-10-5-20-11-32-11z"/>
  </g>

  <!-- Gold accent line -->
  <line x1="60" y1="940" x2="740" y2="940" stroke="#C99A3F" stroke-width="1" opacity="0.6"/>

  <text x="60" y="980" font-family="system-ui, sans-serif" font-size="14" letter-spacing="6" fill="#FAFBFC" opacity="0.7">CABINET STOMATOLOGIC · AMD DENTAL ART</text>
</svg>
